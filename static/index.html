<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Suporte Digisac</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 860px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #1e2433;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
    }

    header p {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }

    .badge {
      margin-left: auto;
      background: #1e2433;
      color: #6366f1;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #2d3748;
    }

    #chat-container {
      flex: 1;
      width: 100%;
      max-width: 860px;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .welcome {
      text-align: center;
      padding: 48px 24px;
      color: #475569;
    }

    .welcome .icon { font-size: 48px; margin-bottom: 16px; }
    .welcome h2 { font-size: 20px; color: #94a3b8; margin-bottom: 8px; }
    .welcome p { font-size: 14px; line-height: 1.6; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .suggestion-btn {
      background: #1e2433;
      border: 1px solid #2d3748;
      color: #94a3b8;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-btn:hover {
      background: #2d3748;
      color: #e2e8f0;
      border-color: #6366f1;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: #6366f1;
    }

    .message.assistant .avatar {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
    }

    .message.user .bubble {
      background: #6366f1;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #1e2433;
      border: 1px solid #2d3748;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .bubble pre {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
      overflow-x: auto;
      font-size: 12.5px;
    }

    .bubble code {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 12.5px;
    }

    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #6366f1;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    footer {
      width: 100%;
      max-width: 860px;
      padding: 16px 24px;
      border-top: 1px solid #1e2433;
    }

    .input-area {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-area:focus-within {
      border-color: #6366f1;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 14px;
      resize: none;
      max-height: 160px;
      font-family: inherit;
      line-height: 1.5;
    }

    #user-input::placeholder { color: #475569; }

    #send-btn {
      background: #6366f1;
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #4f46e5; }
    #send-btn:disabled { background: #334155; cursor: not-allowed; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #334155;
      margin-top: 8px;
    }

    #new-chat-btn {
      background: transparent;
      border: 1px solid #2d3748;
      color: #64748b;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #new-chat-btn:hover { border-color: #6366f1; color: #a5b4fc; }

    /* Scrollbar */
    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div>
    <h1>IA Suporte Digisac</h1>
    <p>Especialista em dúvidas da API</p>
  </div>
  <button id="new-chat-btn" onclick="newChat()">+ Nova conversa</button>
</header>

<div id="chat-container">
  <div class="welcome" id="welcome-screen">
    <div class="icon">📡</div>
    <h2>Olá! Como posso ajudar?</h2>
    <p>Sou especialista na API Digisac. Posso responder dúvidas sobre<br>
    endpoints, autenticação, parâmetros e exemplos de requisições.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion('Como gerar um token de acesso?')">Como gerar um token de acesso?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Como enviar uma mensagem para um contato?')">Como enviar uma mensagem?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Como fazer transferência de chamado?')">Como transferir um chamado?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Como criar um agendamento?')">Como criar um agendamento?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Como listar departamentos?')">Como listar departamentos?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Como enviar um template WhatsApp?')">Como enviar um template?</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Pergunte sobre a API Digisac..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Enviar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="hint">Restrito a dúvidas sobre a API Digisac · Powered by Groq</div>
</footer>

<script>
  let sessionId = null;
  let isLoading = false;

  const chatContainer = document.getElementById('chat-container');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(text) {
    userInput.value = text;
    sendMessage();
  }

  function newChat() {
    sessionId = null;
    chatContainer.innerHTML = `
      <div class="welcome" id="welcome-screen">
        <div class="icon">📡</div>
        <h2>Olá! Como posso ajudar?</h2>
        <p>Sou especialista na API Digisac. Posso responder dúvidas sobre<br>
        endpoints, autenticação, parâmetros e exemplos de requisições.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion('Como gerar um token de acesso?')">Como gerar um token de acesso?</button>
          <button class="suggestion-btn" onclick="sendSuggestion('Como enviar uma mensagem para um contato?')">Como enviar uma mensagem?</button>
          <button class="suggestion-btn" onclick="sendSuggestion('Como fazer transferência de chamado?')">Como transferir um chamado?</button>
          <button class="suggestion-btn" onclick="sendSuggestion('Como criar um agendamento?')">Como criar um agendamento?</button>
          <button class="suggestion-btn" onclick="sendSuggestion('Como listar departamentos?')">Como listar departamentos?</button>
          <button class="suggestion-btn" onclick="sendSuggestion('Como enviar um template WhatsApp?')">Como enviar um template?</button>
        </div>
      </div>`;
  }

  function appendMessage(role, text) {
    const welcome = document.getElementById('welcome-screen');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatMessage(text);

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return div;
  }

  function showTyping() {
    const welcome = document.getElementById('welcome-screen');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    div.appendChild(avatar);
    div.appendChild(typing);
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function formatMessage(text) {
    // Converte blocos de código
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`
    );
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    userInput.value = '';
    userInput.style.height = 'auto';

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      if (!res.ok) {
        const err = await res.json();
        const detail = err.detail || 'Erro desconhecido';
        const error = new Error(detail);
        error.status = res.status;
        throw error;
      }

      const data = await res.json();
      sessionId = data.session_id;
      removeTyping();
      appendMessage('assistant', data.response);
    } catch (err) {
      removeTyping();
      if (err.status === 429 || (err.message || '').toLowerCase().includes('limite diário')) {
        appendMessage('assistant', '⚠️ O limite diário de uso gratuito da IA foi atingido. O limite é renovado automaticamente todo dia. Tente novamente mais tarde.');
      } else {
        appendMessage('assistant', `❌ Erro: ${err.message || 'desconhecido'}`);
      }
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  }
</script>
</body>
</html>
